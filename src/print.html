<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { font-family: 'Segoe UI', sans-serif; color: #1a1917; padding: 40px; font-size: 13px; margin: 0; }
  .p-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
  .p-company { font-size: 18px; font-weight: 700; }
  .p-company-sub { font-size: 11px; color: #6b6860; margin-top: 2px; }
  .p-tag { background: #1D9E75; color: white; padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 700; }
  .p-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid #e5e3dc; }
  .p-lbl { font-size: 10px; color: #9e9b94; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
  .p-val { font-size: 12px; font-weight: 600; }
  .p-val-sub { font-size: 11px; color: #6b6860; margin-top: 1px; }
  .p-table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
  .p-table th { font-size: 10px; font-weight: 600; color: #9e9b94; text-align: left; padding: 0 5px 6px; border-bottom: 1px solid #e5e3dc; text-transform: uppercase; }
  .p-table th:not(:first-child), .p-table td:not(:first-child) { text-align: right; }
  .p-table td { padding: 6px 5px; font-size: 12px; border-bottom: 1px solid #f2f1ed; }
  .p-totals { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; margin-top: 8px; }
  .p-total-row { display: flex; gap: 32px; font-size: 12px; color: #6b6860; }
  .p-total-row span:last-child { min-width: 80px; text-align: right; }
  .p-total-grand { font-size: 15px; font-weight: 700; color: #1a1917; border-top: 1.5px solid #1a1917; padding-top: 7px; margin-top: 5px; }
  .p-notes { margin-top: 20px; padding-top: 14px; border-top: 1px solid #e5e3dc; font-size: 11px; color: #9e9b94; line-height: 1.7; }
</style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
